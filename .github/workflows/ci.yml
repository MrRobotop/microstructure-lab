name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Documentation check
        run: make docs-check

      - name: C++ tests
        run: make test-cpp

      - name: Python tests
        run: make test

      - name: Demo smoke
        run: make demo-smoke

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t microstructure-lab:ci .

      - name: Docker CLI smoke
        run: docker run --rm microstructure-lab:ci microstructure-lab --help
