services:
  microstructure-lab:
    build: .
    command: microstructure-lab --help
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data

  api:
    build: .
    command: microstructure-lab api serve --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts

  dashboard:
    build: .
    command: microstructure-lab dashboard run --port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts
